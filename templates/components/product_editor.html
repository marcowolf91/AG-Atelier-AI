<!-- Reusable Product Editor Modal -->
<div id="product-editor-modal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:9999; align-items:center; justify-content:center;">
    <div class="glass-panel" style="width: 800px; max-height:90vh; overflow-y:auto; padding:40px; border-radius:32px; border:1px solid var(--accent-gold);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
            <h2 id="editor-title" style="font-size:1.5rem; font-weight:800; color:#fff;">Modifica Prodotto</h2>
            <button onclick="closeProductEditor()" class="btn" style="width:40px; height:40px; padding:0; border-radius:50%; background:rgba(255,50,50,0.15); border:1px solid rgba(255,50,50,0.3); color:#ff4d4d; display:flex; align-items:center; justify-content:center; transition:0.3s; cursor:pointer;" onmouseover="this.style.background='rgba(255,50,50,0.3)'" onmouseout="this.style.background='rgba(255,50,50,0.15)'">
                <i class="ph-bold ph-x" style="font-size:1.2rem;"></i>
            </button>
        </div>

        <form id="product-editor-form" onsubmit="saveProductChanges(event)" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:24px;">
            <input type="hidden" id="edit-product-id">
            
            <div class="input-group" style="grid-column: span 2;">
                <label>Tipo Prodotto (Categoria)</label>
                <input type="text" id="edit-type" class="glass-input" placeholder="es. Scarpe, Borsa, Cintura">
            </div>

            <div class="input-group">
                <label>Brand</label>
                <input type="text" id="edit-brand" class="glass-input" required>
            </div>
            
            <div class="input-group">
                <label>Modello</label>
                <input type="text" id="edit-model" class="glass-input" required>
            </div>
            
            <div class="input-group">
                <label>SKU</label>
                <input type="text" id="edit-sku" class="glass-input">
            </div>
            
            <div class="input-group">
                <label>Prezzo (€)</label>
                <input type="number" step="0.01" id="edit-price" class="glass-input">
            </div>

            <div class="input-group" style="grid-column: span 2;">
                <label>Governance Category</label>
                <select id="edit-gov-cat" class="glass-input">
                    <option value="">Nessuna Categoria</option>
                    <!-- Dinamico -->
                </select>
                <p style="font-size:0.65rem; color:var(--text-secondary); margin-top:4px;">Assegna a una categoria Shopify Smart per applicare i tag di policy.</p>
            </div>

            <div class="input-group" style="grid-column: span 2;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <label style="margin-bottom:0;">Tag (separati da virgola)</label>
                    <button type="button" id="btn-generate-tags" onclick="generateTags()" class="btn glass-btn" style="height:24px; font-size:0.6rem; padding:0 8px; border-color:var(--accent-gold); color:var(--accent-gold);">
                        <i class="ph ph-sparkle"></i> GENERA CON AI
                    </button>
                </div>
                <textarea id="edit-tags" class="glass-input" rows="3"></textarea>
            </div>

            <div class="input-group" style="grid-column: span 2;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <label style="margin-bottom:0;">Titolo SEO</label>
                    <button type="button" id="btn-generate-seo" onclick="generateSEOtitle()" class="btn glass-btn" style="height:24px; font-size:0.6rem; padding:0 8px; border-color:var(--accent-gold); color:var(--accent-gold);">
                        <i class="ph ph-sparkle"></i> GENERA CON AI
                    </button>
                </div>
                <input type="text" id="edit-seo-title" class="glass-input">
            </div>

            <div class="input-group" style="grid-column: span 2;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <label style="margin-bottom:0;">Descrizione AI (Italiano)</label>
                    <button type="button" id="btn-generate-ai" onclick="generateAIDescription()" class="btn glass-btn" style="height:28px; font-size:0.65rem; padding:0 12px; border-color:var(--accent-gold); color:var(--accent-gold);">
                        <i class="ph ph-sparkle"></i> GENERA CON AI
                    </button>
                </div>
                <textarea id="edit-description" class="glass-input" rows="5" placeholder="Descrizione dettagliata del prodotto..."></textarea>
            </div>

            <div style="grid-column: span 2; display:flex; gap:16px; margin-top:20px;">
                <button type="submit" class="btn attr-primary" style="flex:1;"><i class="ph ph-floppy-disk"></i> Salva Modifiche</button>
                <button type="button" onclick="closeProductEditor()" class="btn glass-btn" style="flex:1;">Annulla</button>
            </div>
        </form>
    </div>
</div>

        <style>
            .input-group label { display:block; font-size:0.75rem; font-weight:700; color:var(--accent-gold); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px; }
            .input-group input, .input-group select, .input-group textarea { 
                width:100%; border-radius:12px; 
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(255,255,255,0.1);
                color: #fff;
                padding: 12px;
            }
            .glass-input::placeholder {
                color: rgba(255,255,255,0.3) !important;
                opacity: 1;
            }
        </style>

        <script>
        let currentEditingProduct = null;

        async function quickFix(productId, brandHint = '', modelHint = '') {
            const modal = document.getElementById('product-editor-modal');
            const titleEl = document.getElementById('editor-title');
            
            // Impostiamo subito il titolo per dare feedback all'utente
            const displayTitle = brandHint || modelHint ? `Modifica: ${brandHint} ${modelHint}` : `Modifica Prodotto #${productId}`;
            if(titleEl) titleEl.innerText = displayTitle;
            
            modal.style.display = 'flex';
            document.getElementById('edit-product-id').value = productId;

            // Reset campi per evitare di vedere dati vecchi (usiamo placeholders finché non carica)
            const fields = ['edit-brand', 'edit-model', 'edit-sku', 'edit-price', 'edit-tags', 'edit-seo-title', 'edit-description', 'edit-type'];
            fields.forEach(f => {
                const el = document.getElementById(f);
                if(el) {
                    el.value = '';
                    el.placeholder = 'Caricamento...';
                }
            });

            // 1. Caricamento categorie per il dropdown
            try {
                const catRes = await fetch('/api/governance/categories');
                const categories = await catRes.json();
                const select = document.getElementById('edit-gov-cat');
                if(select) {
                    select.innerHTML = '<option value="">Nessuna Categoria</option>' + 
                        categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                }
            } catch(e) { console.error("Errore fetch categorie", e); }

            // 2. Fetch dati prodotto reali dal DB
            try {
                const res = await fetch(`/api/product/${productId}`);
                if(res.ok) {
                    const p = await res.json();
                    console.log("DEBUG: Dati ricevuti in Editor:", p);
                    
                    // Popolamento campi con fallback e ripristino placeholder originali
                    const map = {
                        'edit-brand': p.brand,
                        'edit-model': p.model,
                        'edit-sku': p.sku,
                        'edit-price': p.price,
                        'edit-tags': p.tags,
                        'edit-seo-title': p.seo_title,
                        'edit-description': p.ai_description_it,
                        'edit-type': p.category
                    };

                    Object.entries(map).forEach(([id, val]) => {
                        const el = document.getElementById(id);
                        if(el) {
                            el.value = val !== null && val !== undefined ? val : '';
                            if(id === 'edit-type') el.placeholder = 'es. Scarpe, Borsa, Cintura';
                            else if(id === 'edit-description') el.placeholder = 'Descrizione dettagliata del prodotto...';
                            else el.placeholder = '';
                        }
                    });

                    if(document.getElementById('edit-gov-cat')) {
                        document.getElementById('edit-gov-cat').value = p.governance_category_id || "";
                    }

                    // Aggiorniamo il titolo nel caso i dati dal DB siano più precisi del "hint"
                    if(titleEl) titleEl.innerText = `Modifica: ${p.brand || ''} ${p.model || ''}`;
                } else {
                    showToast("Errore server nel recupero prodotto.", "error");
                }
            } catch(e) { 
                console.error("Errore critico Editor:", e);
                showToast("Errore durante il recupero dei dati.", "error"); 
            }
        }

function closeProductEditor() {
    document.getElementById('product-editor-modal').style.display = 'none';
}

async function saveProductChanges(e) {
    e.preventDefault();
    const pid = document.getElementById('edit-product-id').value;
    const data = {
        category: document.getElementById('edit-type').value,
        brand: document.getElementById('edit-brand').value,
        model: document.getElementById('edit-model').value,
        sku: document.getElementById('edit-sku').value,
        price: document.getElementById('edit-price').value,
        category_id: document.getElementById('edit-gov-cat').value,
        tags: document.getElementById('edit-tags').value,
        seo_title: document.getElementById('edit-seo-title').value,
        ai_description_it: document.getElementById('edit-description').value
    };

    try {
        const res = await fetch(`/api/lab/certify/${pid}`, { // Usiamo certify o aggiungiamo rotta generica
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) {
            showToast("Prodotto aggiornato correttamente!", "success");
            closeProductEditor();
            if(window.location.reload) location.reload();
        }
    } catch(e) { showToast("Errore durante il salvataggio.", "error"); }
}

async function generateSEOtitle() {
    const pid = document.getElementById('edit-product-id').value;
    const btn = document.getElementById('btn-generate-seo');
    const input = document.getElementById('edit-seo-title');
    if(!pid) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> GENERAZIONE...';
    try {
        const res = await fetch(`/api/lab/generate-seo/${pid}`, { method: 'POST' });
        const data = await res.json();
        if(data.status === 'ok') {
            input.value = data.seo_title;
            showToast("✨ Titolo SEO ottimizzato.");
        }
    } catch(e) { showToast("Errore generazione SEO.", "error"); }
    finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ph ph-sparkle"></i> GENERA CON AI';
    }
}

async function generateTags() {
    const pid = document.getElementById('edit-product-id').value;
    const btn = document.getElementById('btn-generate-tags');
    const textarea = document.getElementById('edit-tags');
    if(!pid) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> GENERAZIONE...';
    try {
        const res = await fetch(`/api/lab/generate-tags/${pid}`, { method: 'POST' });
        const data = await res.json();
        if(data.status === 'ok') {
            const tags = Array.isArray(data.tags) ? data.tags.join(', ') : data.tags;
            textarea.value = tags;
            showToast("✨ Tag ottimizzati.");
        }
    } catch(e) { showToast("Errore generazione tag.", "error"); }
    finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ph ph-sparkle"></i> GENERA CON AI';
    }
}

async function generateAIDescription() {
    const pid = document.getElementById('edit-product-id').value;
    const btn = document.getElementById('btn-generate-ai');
    const textarea = document.getElementById('edit-description');
    if(!pid) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> GENERAZIONE...';
    textarea.placeholder = "L'intelligenza artificiale sta scrivendo...";
    try {
        const res = await fetch(`/api/lab/regenerate/${pid}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ model: 'llama3' })
        });
        const data = await res.json();
        if(data.status === 'ok') {
            // Estraiamo la descrizione dal risultato
            const desc = data.ai_description_it;
            if(desc) {
                textarea.value = desc;
                showToast("✨ Descrizione generata con successo!");
            } else {
                showToast("L'AI non ha restituito una descrizione valida.", "warning");
            }
        } else {
            showToast("Errore nella generazione AI.", "error");
        }
    } catch(e) { showToast("Errore di connessione con l'AI.", "error"); }
    finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ph ph-sparkle"></i> GENERA CON AI';
        textarea.placeholder = "Descrizione dettagliata del prodotto...";
    }
}
</script>
