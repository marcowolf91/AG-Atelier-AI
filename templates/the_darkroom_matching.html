{% extends "base.html" %}

{% block content %}
<div class="page-title">Matching Station <span style="font-size:0.8rem; color:var(--text-secondary); margin-left:10px;">(Research & SEO Hub)</span></div>

<div style="display: grid; grid-template-columns: 280px 420px 1fr; gap: 20px; height: calc(100vh - 180px); min-height: 600px;">
    
    <!-- COL 1: QUEUE -->
    <div class="glass-panel" style="padding: 16px; display: flex; flex-direction: column;">
        <div style="font-size: 0.65rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>Coda Matching</span>
                <button onclick="hardRefreshAssets()" class="btn glass-btn" style="width: 24px; height: 24px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%;" title="Aggiorna Assets da Drive">
                    <i class="ph ph-arrows-clockwise" id="refresh-icon"></i>
                </button>
            </div>
            <span id="match-queue-count" class="badge-count">0</span>
        </div>

        <div id="folder-chips-container" style="display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; padding: 6px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); max-height: 100px; overflow-y: auto;">
            <!-- Populated via JS -->
        </div>
        <div id="auto-match-bar" style="display: none; background: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; border-radius: 8px; padding: 10px; margin-bottom: 15px;">
            <div style="font-size: 0.65rem; color: #4CAF50; font-weight: 800; margin-bottom: 8px;">
                <i class="ph ph-magic-wand"></i> AUTO-MATCH DISPONIBILE
            </div>
            <div id="auto-match-text" style="font-size: 0.6rem; margin-bottom: 10px; opacity: 0.8;">Vedo 0 foto con numero di riga.</div>
            <button onclick="runMassAssociateByRow()" class="btn btn-success btn-sm w-100" style="font-size: 0.6rem; font-weight: 800;">
                ASSOCIA TUTTO ORA
            </button>
        </div>
        <div id="match-asset-queue" style="flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: flex-start;">
            <!-- Populated via JS -->
        </div>
        <button onclick="window.location.href='/the-darkroom'" class="btn glass-btn" style="margin-top: 15px; font-size: 0.6rem; width: 100%;">
            <i class="ph ph-arrow-left"></i> TORNA AL BROWSER
        </button>
    </div>

    <!-- COL 2: WORKBOARD (PREVIEW SELEZIONE) -->
    <div class="glass-panel" style="padding: 20px; overflow-y: auto; display: flex; flex-direction: column; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);">
        <div style="font-size: 0.65rem; font-weight: 800; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;">
            <span>Tavolo di Lavoro</span>
            <span id="selected-count-badge" style="background: var(--accent-gold); color:#000; padding:2px 8px; border-radius:10px; font-size:0.6rem;">0 ASSET</span>
        </div>
        
        <div id="workboard-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px;">
            <!-- Qui appariranno le foto selezionate -->
            <div id="workboard-empty" style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                <i class="ph ph-selection-plus" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.2;"></i>
                <p style="font-size: 0.75rem;">Seleziona le foto a sinistra per iniziare il matching</p>
            </div>
        </div>
    </div>

    <!-- COL 3: PRODUCT SEARCH -->
    <div class="glass-panel" style="padding: 20px; display: flex; flex-direction: column;">
        <div style="font-size: 0.65rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;">Ricerca Catalogo</div>
        <div style="position: relative; margin-bottom: 20px;">
            <input type="text" id="product-search" class="glass-input" placeholder="Cerca prodotto..." oninput="handleProductSearch(this.value)" style="padding-left: 35px; height: 40px; font-size: 0.8rem;">
            <i class="ph ph-magnifying-glass" style="position: absolute; left: 12px; top: 12px; color: var(--text-secondary);"></i>
        </div>
        <div id="product-candidates-list" style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-right: 5px; flex-shrink: 0;">
            <!-- Populated via JS -->
        </div>
        <div id="matching-actions-area" style="padding: 15px; border: 2px solid var(--accent-gold); display: none; background: rgba(184, 146, 64, 0.1); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="font-size: 0.6rem; color: var(--accent-gold); font-weight: 800; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 1px;">
                <i class="ph ph-sparkle"></i> Pronto per l'Invio
            </div>
            <label style="font-size: 0.55rem; color: var(--text-secondary); display: block; margin-bottom: 5px;">SEO FILENAME SUGGERITO</label>
            <input type="text" id="seo-filename" class="glass-input" style="margin-bottom: 15px; font-family: monospace; font-size: 0.75rem; color: var(--accent-gold); height: 40px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <button id="btn-radar" onclick="runProductRadar()" class="btn btn-sm" style="flex: 1; background: rgba(255,255,255,0.05); color: var(--accent-gold); border: 1px solid var(--accent-gold); font-size: 0.65rem; font-weight: 800; height: 35px;">
                    <i class="ph ph-radar"></i> RADAR AI
                </button>
                <button id="btn-suggest" onclick="aiSuggestProduct()" class="btn btn-sm" style="flex: 1; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 0.65rem; font-weight: 800; height: 35px;">
                    <i class="ph ph-sparkle"></i> SUGGEST
                </button>
            </div>
            <button id="btn-associate" onclick="finalizeAssociation()" class="btn attr-primary" style="width: 100%; height: 50px; font-weight: 900; font-size: 0.85rem; text-transform: uppercase;">
                ASSOCIA & PUBBLICA <i class="ph ph-paper-plane-right"></i>
            </button>
        </div>
    </div>

</div>

<!-- Toast Notification Container -->
<div id="toast-container" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;"></div>

<script src="/static/js/darkroom_core.js"></script>
<script>
    const fileIds = "{{ file_ids }}".split(',').filter(id => id.length > 0);
    let queueImages = [];
    let selectedAssets = []; // Memorizziamo direttamente gli oggetti immagine
    let selectedProductId = null;

    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        const icon = type === 'success' ? 'ph ph-check-circle' : 'ph ph-warning-circle';
        const color = type === 'success' ? '#4CAF50' : '#f44336';
        
        toast.style.cssText = `
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid ${color};
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideUp 0.3s ease-out forwards;
            pointer-events: auto;
        `;
        
        toast.innerHTML = `<i class="${icon}" style="color:${color}; font-size:1.2rem;"></i> ${message}`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideDown 0.3s ease-in forwards';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // Aggiungiamo le animazioni CSS al volo
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
    `;
    document.head.appendChild(style);

    let currentFolderFilter = null;

    async function init() {
        await DarkroomCore.syncDrive(false);
        
        console.log("🚀 Inizializzazione Matching Station...");
        
        try {
            // Se abbiamo ID specifici nell'URL, carichiamo quelli
            if (fileIds.length > 0) {
                const res = await fetch('/api/darkroom/files-by-ids', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ids: fileIds})
                });
                queueImages = await res.json();
            } else {
                // Altrimenti carichiamo tutto il magazzino libero
                const res = await fetch('/api/darkroom/images');
                const all = await res.json();
                // Filtriamo solo quelli non associati
                queueImages = all.filter(img => !img.associated);
            }
            
            console.log(`✅ Assets pronti: ${queueImages.length}`);
            renderFolderFilters();
            renderQueue();
            updateAutoMatchBar();
        } catch (e) {
            console.error("Init Error:", e);
            showToast("Impossibile caricare la coda immagini.", "error");
        }
        
        handleProductSearch('');
    }

    function renderFolderFilters() {
        const container = document.getElementById('folder-chips-container');
        if (!container) return;
        
        // Task 1: Ordine prioritario basato su Excel
        const SHEET_ORDER = [
            "BORSE DONNA", "POCHETTE", "BORSE UOMO", "BORSE DA VIAGGIO", "ZAINI", 
            "PICCOLA PELLETTERIA", "PICCOLA PELLETTERIA DONNA", "ABBIGLIAMENTO", 
            "CALZATURE DONNA", "CALZATURE UOMO"
        ];

        const folders = [...new Set(queueImages.map(img => img.parent_name || "Senza Cartella"))];
        
        // Ordiniamo: prima quelli in SHEET_ORDER, poi gli altri alfabetici
        folders.sort((a, b) => {
            const idxA = SHEET_ORDER.indexOf(a.toUpperCase());
            const idxB = SHEET_ORDER.indexOf(b.toUpperCase());
            if (idxA !== -1 && idxB !== -1) return idxA - idxB;
            if (idxA !== -1) return -1;
            if (idxB !== -1) return 1;
            return a.localeCompare(b);
        });
        
        let html = `<div class="folder-chip ${!currentFolderFilter ? 'active' : ''}" onclick="setFolderFilter(null)">TUTTE</div>`;
        folders.forEach(f => {
            html += `<div class="folder-chip ${currentFolderFilter === f ? 'active' : ''}" onclick="setFolderFilter('${f}')">${f.toUpperCase()}</div>`;
        });
        container.innerHTML = html;
    }

    function setFolderFilter(folder) {
        currentFolderFilter = folder;
        renderFolderFilters();
        renderQueue();
        updateAutoMatchBar();
        
        // Task 3: Aggiorniamo la lista prodotti in base alla sezione
        handleProductSearch(document.getElementById('product-search').value || '');
    }

    let radarFilterIds = null;

    async function runProductRadar() {
        if (!selectedProductId) {
            showToast("Seleziona prima un prodotto dal catalogo.", "warning");
            return;
        }
        const product = lastSearchResults.find(p => p.id === selectedProductId);
        if (!product) return;

        const btn = document.getElementById('btn-radar');
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="ph ph-radar ph-spin"></i> SCANNING...';

        try {
            const query = `${product.brand} ${product.model}`;
            const res = await fetch(`/api/darkroom/find-matching-images?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            if (data.matching_ids && data.matching_ids.length > 0) {
                radarFilterIds = data.matching_ids;
                showToast(`Radar AI: Trovate ${data.matching_ids.length} foto corrispondenti.`);
                
                if (!document.getElementById('btn-reset-radar')) {
                    const actions = document.getElementById('matching-actions-area');
                    const resetBtn = document.createElement('button');
                    resetBtn.id = 'btn-reset-radar';
                    resetBtn.className = 'btn btn-sm w-100 mt-2';
                    resetBtn.style.cssText = 'background:rgba(255,50,50,0.1); color:#ff5555; border:1px solid rgba(255,50,50,0.3); font-size:0.6rem; font-weight:700; height:30px;';
                    resetBtn.innerHTML = '<i class="ph ph-x-circle"></i> RESET FILTRO RADAR';
                    resetBtn.onclick = resetRadarFilter;
                    actions.appendChild(resetBtn);
                }
            } else {
                showToast("Nessuna immagine trovata per questo modello.", "warning");
            }
            renderQueue();
        } catch (e) {
            console.error("Radar error:", e);
            showToast("Errore Radar AI.", "error");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }
    }

    function resetRadarFilter() {
        radarFilterIds = null;
        const btn = document.getElementById('btn-reset-radar');
        if (btn) btn.remove();
        renderQueue();
    }

    async function hardRefreshAssets() {
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('ph-spin');
        showToast("🔄 Scansione Google Drive in corso...");
        
        try {
            // Chiamata con refresh=true per forzare l'indicizzazione
            queueImages = await DarkroomCore.fetchImages(true);
            renderQueue();
            updateAutoMatchBar();
            showToast("✅ Assets aggiornati!");
        } catch (e) {
            showToast("Errore durante l'aggiornamento.", "error");
        } finally {
            icon.classList.remove('ph-spin');
        }
    }

    async function runMassAssociateByRow() {
        const msg = currentFolderFilter 
            ? `Vuoi associare automaticamente tutte le foto della sezione "${currentFolderFilter.toUpperCase()}" che hanno un numero di riga corrispondente?`
            : "Vuoi associare automaticamente tutte le foto che hanno un numero di riga corrispondente?";
            
        if (!confirm(msg)) return;
        
        try {
            const res = await fetch('/api/darkroom/mass-associate-by-row', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folder_context: currentFolderFilter })
            });
            const data = await res.json();
            if (data.status === 'success') {
                showToast(data.message);
                init(); // Ricarichiamo tutto
            } else {
                showToast(data.message, "info");
            }
        } catch (e) {
            showToast("Errore durante l'auto-match.", "error");
        }
    }

    function updateAutoMatchBar() {
        const autoMatchBar = document.getElementById('auto-match-bar');
        const autoMatchText = document.getElementById('auto-match-text');
        if (!autoMatchBar) return;

        let targetImages = queueImages.filter(img => !img.associated && img.suggested_row);
        if (currentFolderFilter) {
            targetImages = targetImages.filter(img => (img.parent_name || "Senza Cartella") === currentFolderFilter);
        }

        if (targetImages.length > 0) {
            autoMatchBar.style.display = 'block';
            autoMatchText.innerText = `Vedo ${targetImages.length} foto con numero di riga pronte per l'auto-match ${currentFolderFilter ? 'in ' + currentFolderFilter : ''}.`;
        } else {
            autoMatchBar.style.display = 'none';
        }
    }

    function renderQueue() {
        const queue = document.getElementById('match-asset-queue');
        const countBadge = document.getElementById('match-queue-count');
        
        if (!queue) return;
        queue.innerHTML = '';

        // Filtriamo le immagini in base alla cartella selezionata (Crumble Menu)
        let displayImages = queueImages;
        if (currentFolderFilter) {
            displayImages = displayImages.filter(img => (img.parent_name || "Senza Cartella") === currentFolderFilter);
        }

        // Applichiamo anche il filtro Radar se attivo
        if (radarFilterIds) {
            displayImages = displayImages.filter(img => radarFilterIds.includes(img.id));
        }

        countBadge.innerText = displayImages.length;
        
        displayImages.forEach(img => {
            const isSelected = selectedAssets.some(x => String(x.id) === String(img.id));
            const item = document.createElement('div');
            item.style.cssText = `aspect-ratio:1; border-radius:8px; overflow:hidden; background:#000; cursor:pointer; border:2px solid ${isSelected ? 'var(--accent-gold)' : 'rgba(255,255,255,0.1)'}; position:relative;`;
            item.onclick = () => toggleQueueSelection(img);
            item.innerHTML = `
                <img src="/api/drive/proxy/${img.id}" style="width:100%; height:100%; object-fit:cover; opacity:${isSelected ? '1' : '0.7'};">
                ${isSelected ? '<div style="position:absolute; top:5px; right:5px; background:var(--accent-gold); color:#000; border-radius:50%; width:16px; height:16px; display:flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:900;"><i class="ph ph-check"></i></div>' : ''}
            `;
            queue.appendChild(item);
        });

        updateWorkboard();
    }

    async function loadBatchToWorkboard(batch) {
        selectedAssets = [...batch.images];
        updateWorkboard();
        
        // Bonus Fase 3 (Anticipato): Tentativo di auto-ricerca
        const firstName = batch.images[0].name.toLowerCase();
        // Se il nome contiene indizi, proviamo a cercare
        const cleanName = batch.images[0].name.split('_')[0].split('-')[0];
        if (cleanName.length > 3) {
            handleProductSearch(cleanName);
        }
    }

    function toggleQueueSelection(img) {
        const idx = selectedAssets.findIndex(x => String(x.id) === String(img.id));
        if (idx === -1) {
            selectedAssets.push(img);
        } else {
            selectedAssets.splice(idx, 1);
        }
        renderQueue();
    }

    function updateWorkboard() {
        const grid = document.getElementById('workboard-grid');
        const empty = document.getElementById('workboard-empty');
        const badge = document.getElementById('selected-count-badge');
        
        if (!grid || !badge) return;

        badge.innerText = `${selectedAssets.length} ASSET`;
        
        if (selectedAssets.length === 0) {
            grid.innerHTML = '';
            if (empty) {
                grid.appendChild(empty);
                empty.style.display = 'block';
            }
            return;
        }

        if (empty) empty.style.display = 'none';
        
        // Pulizia totale della griglia prima del nuovo render
        grid.innerHTML = '';
        
        selectedAssets.forEach(img => {
            const card = document.createElement('div');
            card.className = 'workboard-card';
            card.style.cssText = 'aspect-ratio:1; border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); background:#000; position:relative; min-width: 120px;';
            card.innerHTML = `
                <img src="/api/drive/proxy/${img.id}" style="width:100%; height:100%; object-fit:contain; display:block;">
                <div style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.8); padding:5px; font-size:0.55rem; color:#fff; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-top:1px solid rgba(255,255,255,0.1);">
                    ${img.name}
                </div>
            `;
            grid.appendChild(card);
        });
        
        console.log(`Rendered ${selectedAssets.length} cards in workboard.`);
    }

    let lastSearchResults = [];

    async function handleProductSearch(query) {
        const list = document.getElementById('product-candidates-list');
        list.innerHTML = '<div style="text-align:center; padding:20px;"><i class="ph ph-circle-notch ph-spin"></i></div>';
        
        // Task 3: Passiamo il currentFolderFilter come sheet_context
        lastSearchResults = await DarkroomCore.fetchProducts(query, true, currentFolderFilter || '');
        renderProductResults();
    }

    function renderProductResults() {
        const list = document.getElementById('product-candidates-list');
        list.innerHTML = '';
        
        lastSearchResults.forEach(p => {
            if (!p.model) return;

            const card = document.createElement('div');
            const isSelected = (selectedProductId === p.id);
            
            // Verifichiamo se ha già immagini (matched_images_json è una stringa JSON o null)
            let imageCount = 0;
            try {
                if (p.matched_images_json) {
                    const imgs = JSON.parse(p.matched_images_json);
                    imageCount = Array.isArray(imgs) ? imgs.length : 0;
                }
            } catch(e) {}

            card.className = 'glass-panel product-card';
            card.style.cssText = `padding:12px; cursor:pointer; border:1px solid ${isSelected ? 'var(--accent-gold)' : 'rgba(255,255,255,0.05)'}; transition:0.2s; position:relative; ${imageCount > 0 ? 'border-left: 3px solid #4CAF50;' : ''}`;
            card.onclick = () => selectProductForAssociation(p);
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px;">
                    <div style="font-size:0.6rem; color:var(--accent-gold); font-weight:800; text-transform:uppercase;">
                        ${p.brand} 
                        ${p.category ? `<span style="color:var(--text-secondary); margin-left:4px; font-weight:600;">| ${p.category}</span>` : ''}
                        ${p.color ? `<span style="color:var(--text-secondary); margin-left:4px; font-weight:600;">| ${p.color}</span>` : ''}
                    </div>
                    <div style="display:flex; gap:5px; align-items:center;">
                        ${imageCount > 0 ? `<span style="font-size:0.5rem; background:#4CAF50; color:#fff; padding:1px 5px; border-radius:3px; font-weight:700;"><i class="ph ph-images"></i> ${imageCount} MATCHED</span>` : ''}
                        ${p.material ? `<span style="font-size:0.5rem; background:rgba(255,255,255,0.1); padding:1px 5px; border-radius:3px; color:#fff; font-weight:700; border:1px solid var(--accent-gold);">${p.material}</span>` : ''}
                        <div style="font-size:0.55rem; color:var(--text-secondary); font-family:monospace;">${p.sku || ''}</div>
                    </div>
                </div>
                <div style="font-size:0.85rem; color:#fff; font-weight:700; margin-bottom:6px;">${p.model}</div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    ${p.size ? `<span style="font-size:0.55rem; background:var(--accent-gold); padding:2px 6px; border-radius:4px; color:#000; font-weight:800;">T. ${p.size}</span>` : ''}
                </div>
                ${isSelected ? '<div style="position:absolute; top:-5px; right:-5px; background:var(--accent-gold); color:#000; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; box-shadow:0 0 10px var(--accent-gold);"><i class="ph ph-check-circle"></i></div>' : ''}
            `;
            list.appendChild(card);
        });
    }

    function selectProductForAssociation(p) {
        selectedProductId = p.id;
        document.getElementById('matching-actions-area').style.display = 'block';
        const seoInput = document.getElementById('seo-filename');
        
        let parts = [p.brand, p.model];
        if (p.material) parts.push(p.material);
        const baseName = parts.join('-').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        seoInput.value = baseName;
        renderProductResults();
    }

    async function aiSuggestProduct() {
        const focusId = selectedAssets.length > 0 ? selectedAssets[selectedAssets.length - 1].id : null;
        if (!focusId) {
            alert("Seleziona almeno un'immagine per ricevere un suggerimento AI.");
            return;
        }
        const loader = document.getElementById('ai-loader');
        if (loader) loader.style.display = 'inline-block';
        try {
            const res = await fetch(`/api/darkroom/analyze-vision?file_id=${focusId}`);
            const data = await res.json();
            if (data.suggestion) {
                document.getElementById('product-search').value = data.suggestion;
                handleProductSearch(data.suggestion);
            }
        } catch(e) {
            console.error("AI Suggestion error:", e);
        } finally {
            if (loader) loader.style.display = 'none';
        }
    }

    async function finalizeAssociation() {
        if (selectedAssets.length === 0 || !selectedProductId) {
            alert("Seleziona almeno una foto e un prodotto.");
            return;
        }
        
        const btn = document.getElementById('btn-associate');
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="ph ph-circle-notch ph-spin"></i> PUBBLICAZIONE...';
        
        const payload = {
            product_id: selectedProductId,
            file_ids: selectedAssets.map(x => x.id),
            seo_name: document.getElementById('seo-filename').value
        };

        try {
            const res = await fetch('/api/darkroom/associate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                const associatedIds = selectedAssets.map(x => x.id);
                queueImages = queueImages.filter(img => !associatedIds.includes(img.id));
                selectedAssets = [];
                
                showToast(`Associazione completata! ${associatedIds.length} immagini collegate.`);
                document.getElementById('matching-actions-area').style.display = 'none';

                // Pulizia risultati di ricerca per evitare che il prodotto 'usato' rimanga visibile
                lastSearchResults = lastSearchResults.filter(p => p.id !== selectedProductId);
                selectedProductId = null;
                document.getElementById('product-search').value = '';
                renderProductResults(); // Ridisegna la lista immediatamente
                
                if (queueImages.length === 0) {
                    setTimeout(() => {
                        alert("Tutti gli asset associati!");
                        window.location.href = '/the-darkroom';
                    }, 1000);
                } else {
                    renderQueue();
                    renderProductResults();
                }
            } else {
                const err = await res.json();
                showToast("Errore: " + (err.message || "Sconosciuto"), "error");
            }
        } catch(e) {
            showToast("Errore di rete: impossibile completare l'azione.", "error");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }
    }

    init();
</script>
